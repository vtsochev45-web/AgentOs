          type: integer
      required:
        - name
        - path
        - type

    WebsiteFileContent:
      type: object
      properties:
        path:
          type: string
        content:
          type: string
      required:
        - path
        - content

    WebsiteFileDiff:
      type: object
      properties:
        path:
          type: string
        before:
          type: string
        after:
          type: string
        changed:
          type: boolean
      required:
        - path
        - before
        - after
        - changed
