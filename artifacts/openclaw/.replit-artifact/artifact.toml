kind = "web"
previewPath = "/"
title = "Openclaw Agent OS"
version = "1.0.0"
id = "artifacts/openclaw"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20581

[services.development]
run = "pnpm --filter @workspace/openclaw run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/openclaw", "run", "build" ]
publicDir = "artifacts/openclaw/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20581"
BASE_PATH = "/"
